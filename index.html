<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>TOO MUCH - Loading</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f5a7a 0%, #1d7eaa 50%, #2a9bc9 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Background Particles */
        .particles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 0;
        }

        .particle {
            position: absolute;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 50%;
            animation: float 8s infinite ease-in-out;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) translateX(0); opacity: 0.3; }
            50% { transform: translateY(-20px) translateX(10px); opacity: 0.6; }
        }

        .splash-container {
            text-align: center;
            z-index: 10;
            animation: fadeInUp 0.8s ease-out;
            padding: 20px;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo-wrapper {
            margin-bottom: 24px;
            animation: bounce 2s ease-in-out infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        .logo-icon {
            font-size: 80px;
            filter: drop-shadow(0 8px 20px rgba(0,0,0,0.2));
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .logo-title {
            font-size: 48px;
            font-weight: 800;
            color: white;
            letter-spacing: -1px;
            margin-top: 8px;
            text-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .logo-tagline {
            font-size: 14px;
            color: rgba(255,255,255,0.85);
            margin-top: 8px;
            letter-spacing: 0.5px;
        }

        .loading-container {
            margin-top: 48px;
            width: 250px;
            margin-left: auto;
            margin-right: auto;
        }

        .loading-bar {
            width: 100%;
            height: 4px;
            background: rgba(255,255,255,0.2);
            border-radius: 10px;
            overflow: hidden;
        }

        .loading-progress {
            width: 0%;
            height: 100%;
            background: white;
            border-radius: 10px;
            animation: loading 2.5s ease-out forwards;
            box-shadow: 0 0 10px rgba(255,255,255,0.5);
        }

        @keyframes loading {
            0% { width: 0%; }
            20% { width: 15%; }
            40% { width: 35%; }
            60% { width: 60%; }
            80% { width: 85%; }
            100% { width: 100%; }
        }

        .loading-text {
            margin-top: 12px;
            font-size: 12px;
            color: rgba(255,255,255,0.7);
            letter-spacing: 1px;
        }

        .dot {
            display: inline-block;
            animation: blink 1.4s infinite;
        }

        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes blink {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        .version-info {
            position: absolute;
            bottom: 20px;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 11px;
            color: rgba(255,255,255,0.5);
            z-index: 10;
        }

        .food-particle {
            position: absolute;
            font-size: 24px;
            opacity: 0.3;
            animation: floatFood 12s infinite linear;
            pointer-events: none;
        }

        @keyframes floatFood {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.3; }
            90% { opacity: 0.3; }
            100% { transform: translateY(-20vh) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>
    <div class="particles" id="particles"></div>
    <div id="foodParticles"></div>

    <div class="splash-container">
        <div class="logo-wrapper">
            <div class="logo-icon">🍽️➡️♻️</div>
            <div class="logo-title">TOO MUCH</div>
            <div class="logo-tagline">Zero Food Waste • Zero Emission</div>
        </div>

        <div class="loading-container">
            <div class="loading-bar">
                <div class="loading-progress"></div>
            </div>
            <div class="loading-text">
                Menyiapkan platform<span class="dot">.</span><span class="dot">.</span><span class="dot">.</span>
            </div>
        </div>

        <div style="margin-top: 20px; font-size: 12px; color: rgba(255,255,255,0.5);">
            🌱 Reduksi Food Loss & Waste
        </div>
    </div>

    <div class="version-info">
        Version 1.0 | Powered by ProfyTeam
    </div>

    <script>
        function createParticles() {
            const particlesContainer = document.getElementById('particles');
            for (let i = 0; i < 50; i++) {
                const particle = document.createElement('div');
                particle.classList.add('particle');
                const size = Math.random() * 8 + 2;
                particle.style.width = size + 'px';
                particle.style.height = size + 'px';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.top = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 5 + 's';
                particle.style.animationDuration = Math.random() * 5 + 5 + 's';
                particlesContainer.appendChild(particle);
            }
        }

        function createFoodParticles() {
            const foodContainer = document.getElementById('foodParticles');
            const foods = ['🍚', '🍔', '🥗', '🍕', '🥘', '🍛', '🥙', '🍲', '🍜', '🥦', '🍅', '🌽'];
            
            for (let i = 0; i < 20; i++) {
                const food = document.createElement('div');
                food.classList.add('food-particle');
                food.textContent = foods[Math.floor(Math.random() * foods.length)];
                food.style.left = Math.random() * 100 + '%';
                food.style.fontSize = (Math.random() * 20 + 16) + 'px';
                food.style.animationDelay = Math.random() * 8 + 's';
                food.style.animationDuration = Math.random() * 8 + 8 + 's';
                foodContainer.appendChild(food);
            }
        }

        const loadingMessages = [
            "Menyiapkan platform",
            "Menghubungkan mitra HOREKA",
            "Mengaktifkan AI Impact Tracker",
            "Menyiapkan data surplus makanan",
            "Hampir selesai"
        ];
        
        let messageIndex = 0;
        const loadingTextElement = document.querySelector('.loading-text');
        
        const messageInterval = setInterval(() => {
            messageIndex = (messageIndex + 1) % loadingMessages.length;
            loadingTextElement.innerHTML = loadingMessages[messageIndex] + '<span class="dot">.</span><span class="dot">.</span><span class="dot">.</span>';
        }, 600);

        // Redirect ke home.html setelah loading (BUKAN index.html lagi)
        setTimeout(() => {
            clearInterval(messageInterval);
            
            document.body.style.transition = 'opacity 0.5s ease';
            document.body.style.opacity = '0';
            
            setTimeout(() => {
                // Cek apakah user sudah pernah login sebelumnya
                const lastRole = localStorage.getItem('userRole');
                const lastDashboard = localStorage.getItem('lastDashboard');
                
                if (lastRole && lastDashboard) {
                    window.location.href = lastDashboard;
                } else {
                    // REDIRECT KE home.html (bukan index.html)
                    window.location.href = 'home.html';
                }
            }, 500);
        }, 2500);

        createParticles();
        createFoodParticles();
    </script>
</body>
</html>
