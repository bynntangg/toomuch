<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TOO MUCH - Loading</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(145deg, #0f0717 0%, #1a0f2e 50%, #0d0718 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        /* Animated Background Orbs */
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            z-index: 0;
            animation: floatOrb 12s ease-in-out infinite;
        }

        @keyframes floatOrb {
            0%, 100% { transform: translate(0, 0) scale(1); opacity: 0.4; }
            33% { transform: translate(30px, -40px) scale(1.1); opacity: 0.6; }
            66% { transform: translate(-20px, 30px) scale(0.9); opacity: 0.5; }
        }

        .orb-1 {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(139, 92, 246, 0.4), rgba(79, 70, 229, 0.1));
            top: -150px;
            right: -150px;
            animation-delay: 0s;
        }

        .orb-2 {
            width: 350px;
            height: 350px;
            background: radial-gradient(circle, rgba(192, 132, 252, 0.3), rgba(168, 85, 247, 0.1));
            bottom: -120px;
            left: -120px;
            animation-delay: 4s;
        }

        .orb-3 {
            width: 250px;
            height: 250px;
            background: radial-gradient(circle, rgba(236, 72, 153, 0.2), rgba(219, 39, 119, 0.05));
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation-delay: 8s;
        }

        /* Grid Pattern */
        .grid-pattern {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(139, 92, 246, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(139, 92, 246, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
            z-index: 0;
        }

        /* Floating Food Particles */
        .floating-particle {
            position: absolute;
            font-size: 14px;
            pointer-events: none;
            z-index: 0;
            animation: floatParticle 15s linear infinite;
            opacity: 0.12;
        }

        @keyframes floatParticle {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.2; }
            90% { opacity: 0.2; }
            100% { transform: translateY(-20vh) rotate(360deg); opacity: 0; }
        }

        /* Main Container */
        .container {
            max-width: 420px;
            width: 100%;
            padding: 24px;
            text-align: center;
            position: relative;
            z-index: 10;
            animation: containerFadeIn 0.6s ease-out;
        }

        @keyframes containerFadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Logo Section */
        .logo-section {
            margin-bottom: 40px;
            position: relative;
        }

        .logo-ring {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 110px;
            height: 110px;
            margin-left: -55px;
            margin-top: -55px;
            border-radius: 50%;
            border: 1px solid rgba(139, 92, 246, 0.3);
            animation: rotateRing 6s linear infinite;
        }

        .logo-ring::before {
            content: '';
            position: absolute;
            top: -5px;
            left: -5px;
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 1px dashed rgba(192, 132, 252, 0.4);
            animation: rotateRingReverse 8s linear infinite;
        }

        @keyframes rotateRing {
            from { transform: translate(-50%, -50%) rotate(0deg); }
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }

        @keyframes rotateRingReverse {
            from { transform: translate(-50%, -50%) rotate(360deg); }
            to { transform: translate(-50%, -50%) rotate(0deg); }
        }

        .logo-icon {
            font-size: 56px;
            margin-bottom: 16px;
            display: inline-block;
            position: relative;
            z-index: 2;
            filter: drop-shadow(0 0 20px rgba(139, 92, 246, 0.4));
            animation: iconPulse 2s ease-in-out infinite;
        }

        @keyframes iconPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .logo-title {
            font-size: 38px;
            font-weight: 800;
            background: linear-gradient(135deg, #ffffff 0%, #c084fc 40%, #a855f7 100%);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
        }

        .logo-subtitle {
            font-size: 11px;
            color: #a78bfa;
            margin-top: 8px;
            font-weight: 400;
            letter-spacing: 1px;
        }

        /* Loading Card */
        .loading-card {
            background: rgba(30, 20, 50, 0.6);
            backdrop-filter: blur(20px);
            border-radius: 40px;
            padding: 40px 32px;
            border: 1px solid rgba(139, 92, 246, 0.2);
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.4);
        }

        /* Simple Spinner */
        .spinner-wrapper {
            margin-bottom: 32px;
        }

        .spinner {
            width: 52px;
            height: 52px;
            margin: 0 auto;
            border: 3px solid rgba(139, 92, 246, 0.2);
            border-top-color: #a855f7;
            border-right-color: #c084fc;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Progress Bar */
        .progress-section {
            margin-bottom: 24px;
        }

        .progress-bar-wrapper {
            background: rgba(139, 92, 246, 0.15);
            border-radius: 40px;
            height: 4px;
            overflow: hidden;
        }

        .progress-bar {
            background: linear-gradient(90deg, #a855f7, #c084fc);
            width: 0%;
            height: 100%;
            border-radius: 40px;
            transition: width 0.2s ease;
            box-shadow: 0 0 8px rgba(168, 85, 247, 0.5);
        }

        .percentage {
            margin-top: 12px;
            font-size: 14px;
            font-weight: 600;
            background: linear-gradient(135deg, #c084fc, #a855f7);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: 1px;
        }

        /* Loading Message */
        .loading-message {
            margin-top: 24px;
            font-size: 13px;
            color: #b9a8d4;
            font-weight: 500;
        }

        /* Tips Section */
        .tips-section {
            margin-top: 32px;
            padding-top: 24px;
            border-top: 1px solid rgba(139, 92, 246, 0.15);
        }

        .tip-text {
            font-size: 12px;
            color: #a998c2;
            line-height: 1.5;
        }

        .tip-icon {
            color: #c084fc;
            margin-right: 8px;
        }

        /* Skip Button */
        .skip-btn {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: rgba(139, 92, 246, 0.1);
            border: 1px solid rgba(139, 92, 246, 0.25);
            color: #c084fc;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            padding: 10px 20px;
            border-radius: 40px;
            transition: all 0.25s ease;
            font-family: 'Inter', sans-serif;
            backdrop-filter: blur(8px);
            z-index: 20;
        }

        .skip-btn:hover {
            background: rgba(139, 92, 246, 0.2);
            border-color: rgba(192, 132, 252, 0.4);
            color: #e9d5ff;
            transform: translateY(-1px);
        }

        /* Version Info */
        .version {
            position: fixed;
            bottom: 20px;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 9px;
            color: #5e4e7a;
            z-index: 10;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .container {
                padding: 16px;
            }
            .loading-card {
                padding: 32px 24px;
            }
            .logo-title {
                font-size: 32px;
            }
            .skip-btn {
                bottom: 16px;
                right: 16px;
                padding: 8px 16px;
            }
            .logo-ring {
                width: 90px;
                height: 90px;
                margin-left: -45px;
                margin-top: -45px;
            }
            .logo-ring::before {
                width: 100px;
                height: 100px;
            }
            .logo-icon {
                font-size: 48px;
            }
        }
    </style>
</head>
<body>
    <!-- Animated Orbs -->
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
    <div class="grid-pattern"></div>

    <!-- Floating Food Particles Container -->
    <div id="particlesContainer"></div>

    <div class="container">
        <div class="logo-section">
            <div class="logo-ring"></div>
            <div class="logo-icon">🍽️🌱♻️</div>
            <div class="logo-title">TOO MUCH</div>
            <div class="logo-subtitle">CIRCULAR FOOD PLATFORM</div>
        </div>

        <div class="loading-card">
            <div class="spinner-wrapper">
                <div class="spinner"></div>
            </div>

            <div class="progress-section">
                <div class="progress-bar-wrapper">
                    <div class="progress-bar" id="progressBar"></div>
                </div>
                <div class="percentage" id="percentage">0%</div>
            </div>

            <div class="loading-message" id="loadingMessage">
                Menyiapkan platform Anda
            </div>

            <div class="tips-section">
                <div class="tip-text" id="tipText">
                    <i class="fas fa-leaf tip-icon"></i>
                    Setiap 1kg makanan terselamatkan = 2.5kg CO₂eq tereduksi
                </div>
            </div>
        </div>
    </div>

    <button class="skip-btn" id="skipBtn">Lewati →</button>
    <div class="version">Version 2.0 | GenBI Innovation Zone | Zero Food Waste</div>

    <script>
        let progress = 0;
        let progressInterval;
        let redirectTimeout;
        let isRedirecting = false;

        // Messages for different loading stages
        const loadingMessages = [
            "Menyiapkan platform zero waste",
            "Menghubungkan mitra HOREKA",
            "Mengaktifkan AI Impact Tracker",
            "Memuat data surplus makanan",
            "Hampir selesai"
        ];

        // Tips collection
        const tips = [
            "🍽️ 115-184 kg limbah pangan per kapita per tahun di Indonesia",
            "🌱 Bergabung dengan 2.500+ mitra zero waste",
            "🤖 AI memprediksi limbah dengan akurasi 87%",
            "💰 Hemat hingga 40% dengan surplus food",
            "♻️ Setiap 1kg makanan terselamatkan = 2.5kg CO₂eq",
            "🏨 100+ mitra HOREKA telah bergabung"
        ];

        let tipIndex = 0;
        let messageIndex = 0;

        // DOM elements
        const progressBar = document.getElementById('progressBar');
        const percentageEl = document.getElementById('percentage');
        const loadingMessageEl = document.getElementById('loadingMessage');
        const tipTextEl = document.getElementById('tipText');

        // Create floating food particles
        function createParticles() {
            const container = document.getElementById('particlesContainer');
            if (!container) return;
            
            const foodIcons = ['🍚', '🍔', '🥗', '🍕', '🥘', '🍛', '🥙', '🍲', '🍜', '🥦', '🍅', '🌽', '🍎', '🍊', '🥑', '🍽️', '🌱', '♻️'];
            
            for (let i = 0; i < 40; i++) {
                const particle = document.createElement('div');
                particle.classList.add('floating-particle');
                particle.textContent = foodIcons[Math.floor(Math.random() * foodIcons.length)];
                particle.style.left = Math.random() * 100 + '%';
                particle.style.fontSize = (Math.random() * 16 + 10) + 'px';
                particle.style.animationDelay = Math.random() * 15 + 's';
                particle.style.animationDuration = Math.random() * 12 + 8 + 's';
                particle.style.opacity = Math.random() * 0.15 + 0.05;
                container.appendChild(particle);
            }
        }

        // Update progress - FIXED VERSION
        function startLoading() {
            progressInterval = setInterval(() => {
                if (progress < 100 && !isRedirecting) {
                    // Smooth progression
                    const increment = Math.random() * 3 + 1;
                    progress = Math.min(progress + increment, 100);
                    
                    // Update UI
                    const percentValue = Math.floor(progress);
                    percentageEl.textContent = percentValue + '%';
                    progressBar.style.width = progress + '%';
                    
                    // Update message based on progress
                    const newMessageIndex = Math.floor(progress / 20);
                    if (newMessageIndex < loadingMessages.length && newMessageIndex !== messageIndex) {
                        messageIndex = newMessageIndex;
                        loadingMessageEl.textContent = loadingMessages[messageIndex] + '...';
                    }
                    
                    // When complete
                    if (progress >= 100) {
                        clearInterval(progressInterval);
                        loadingMessageEl.textContent = "Platform siap! Mengarahkan...";
                        
                        redirectTimeout = setTimeout(() => {
                            redirect();
                        }, 800);
                    }
                }
            }, 100);
        }

        // Rotate tips every 4 seconds
        function startTipsRotation() {
            setInterval(() => {
                tipIndex = (tipIndex + 1) % tips.length;
                if (tipTextEl) {
                    const iconClass = tipIndex % 2 === 0 ? 'fa-leaf' : 'fa-recycle';
                    tipTextEl.innerHTML = `<i class="fas ${iconClass} tip-icon"></i> ${tips[tipIndex]}`;
                }
            }, 4000);
        }

        // Redirect function - ARAHKAN KE home.html
        function redirect() {
            if (isRedirecting) return;
            isRedirecting = true;
            
            if (progressInterval) clearInterval(progressInterval);
            if (redirectTimeout) clearTimeout(redirectTimeout);
            
            // Fade out effect
            document.body.style.transition = 'opacity 0.3s ease';
            document.body.style.opacity = '0';
            
            setTimeout(() => {
                // Redirect ke home.html (halaman pilih role)
                window.location.href = 'home.html';
            }, 400);
        }

        // Skip button handler
        const skipBtn = document.getElementById('skipBtn');
        if (skipBtn) {
            skipBtn.addEventListener('click', () => {
                if (!isRedirecting) {
                    if (progressInterval) clearInterval(progressInterval);
                    if (redirectTimeout) clearTimeout(redirectTimeout);
                    redirect();
                }
            });
        }

        // Keyboard support (Enter to skip)
        document.addEventListener('keydown', (e) => {
            if ((e.key === 'Enter' || e.key === 'Escape') && !isRedirecting) {
                if (progressInterval) clearInterval(progressInterval);
                if (redirectTimeout) clearTimeout(redirectTimeout);
                redirect();
            }
        });

        // Cleanup on page unload
        window.addEventListener('beforeunload', () => {
            if (progressInterval) clearInterval(progressInterval);
            if (redirectTimeout) clearTimeout(redirectTimeout);
        });

        // Initialize everything
        createParticles();
        startLoading();
        startTipsRotation();
    </script>
</body>
</html>
